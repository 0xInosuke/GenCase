<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenCase Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-banner">
    <div class="app-banner__inner">
      <strong>GenCase</strong>
    </div>
  </header>
  <main class="shell">
    <aside class="sidebar">
      <p class="eyebrow">GenCase</p>
      <div class="sidebar-title-row">
        <h1>Admin Console</h1>
        <button type="button" id="console-toggle" class="secondary compact">Expand</button>
      </div>
      <p class="sidebar-copy">Each business model uses the same list, detail, edit, and delete workflow.</p>
      <nav class="nav" id="model-nav">
        <button type="button" data-model="users">Users</button>
        <button type="button" data-model="groups">Groups</button>
        <button type="button" data-model="user-groups">User Group Assignment</button>
        <button type="button" data-model="workflows">Workflows</button>
        <button type="button" data-model="cases">Case</button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="workspace-header">
        <div>
          <p class="workspace-label" id="view-label">List View</p>
          <h2 id="view-title">Cases</h2>
        </div>
        <div class="header-actions">
          <button type="button" id="create-button">Create New</button>
          <button type="button" id="logout-button" class="secondary">Logout</button>
        </div>
      </header>
      <section id="page-toast" class="page-toast hidden" aria-live="polite">
        <span id="page-toast-message"></span>
        <button type="button" id="page-toast-close" class="secondary compact page-toast-close" aria-label="Close message">Close</button>
      </section>

      <section class="panel" id="list-view">
        <div class="toolbar">
          <label class="toolbar-field toolbar-field--search">
            Search
            <input id="search-input" placeholder="Search records">
            <span id="search-mode-pill" class="search-mode-pill hidden"></span>
            <span id="search-help-text" class="search-help-text"></span>
          </label>
          <label class="toolbar-field">
            Page Size
            <select id="page-size-select">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>
        <div id="list-table"></div>
        <div class="pagination">
          <button type="button" id="prev-page" class="secondary">Previous</button>
          <span id="page-indicator">Page 1</span>
          <button type="button" id="next-page" class="secondary">Next</button>
        </div>
      </section>

      <section class="panel hidden" id="detail-view">
        <div class="detail-header">
          <div>
            <p class="workspace-label">Detail View</p>
            <h3 id="detail-title">Record Detail</h3>
          </div>
          <div class="detail-actions">
            <button type="button" id="back-to-list" class="secondary">Back</button>
            <button type="button" id="export-json-button" class="secondary hidden">Export JSON</button>
            <button type="button" id="export-markdown-button" class="secondary hidden">Export Markdown</button>
            <button type="button" id="edit-button">Edit</button>
            <button type="button" id="delete-button" class="danger">Delete</button>
          </div>
        </div>
        <div id="detail-content" class="detail-grid"></div>
        <section id="case-comments" class="comments-section hidden">
          <div class="comments-header">
            <h4>Comments</h4>
          </div>
          <div id="case-comments-list" class="comments-list"></div>
          <form id="case-comment-form" class="form comments-form">
            <label>
              Add Comment
              <textarea id="case-comment-input" name="content" rows="4" required placeholder="Write your reply..."></textarea>
            </label>
            <div class="form-actions">
              <button type="submit">Post Comment</button>
            </div>
          </form>
        </section>
        <section id="audit-records" class="comments-section hidden">
          <div class="comments-header">
            <h4>Audit Records</h4>
            <button type="button" id="toggle-audit-button" class="secondary compact">Collapse</button>
          </div>
          <div id="audit-records-list" class="comments-list"></div>
        </section>
      </section>

      <section class="panel hidden" id="edit-view">
        <div class="detail-header">
          <div>
            <p class="workspace-label">Edit View</p>
            <h3 id="edit-title">Edit Record</h3>
          </div>
          <button type="button" id="cancel-edit" class="secondary">Cancel</button>
        </div>
        <form id="edit-form" class="form"></form>
      </section>
    </section>
  </main>
  <section id="page-busy" class="page-busy hidden" aria-live="polite">
    <span class="spinner" aria-hidden="true"></span>
    <span id="page-busy-message">Loading...</span>
  </section>

  <script type="module" src="/app.js"></script>
</body>
</html>
